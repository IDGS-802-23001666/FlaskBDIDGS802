<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask IDGS</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
</head>
<body class="bg-gray-50"> <nav class="bg-white border-b border-gray-200 px-2 sm:px-4 py-2.5 shadow-sm">
        <div class="container flex flex-wrap items-center justify-between mx-auto">
            <a href="{{ url_for('index_general') }}" class="flex items-center">
                <img src="{{url_for('static',filename='img/OIP.png')}}" class="rounded-2xl h-6 mr-3 sm:h-9" alt="Logo">
                <span class="self-center text-xl font-semibold whitespace-nowrap text-gray-900">Flask IDGS</span>
            </a>
            
            <div class="flex md:order-2">
                <a href="{{ url_for('cursos.inscribir') }}" 
                   class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center mr-3 md:mr-0">
                   Inscribir Alumno
                </a>
                <button data-collapse-toggle="navbar-cta" type="button" class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">
                <ul class="flex flex-col p-4 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:text-sm md:font-medium md:border-0 md:bg-white">
                    <li>
                        <a href="{{ url_for('index_general') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700" aria-current="page">Home</a>
                    </li>
                    <li>
                        <a href="{{ url_for('cursos.index') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700">Cursos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('alumnos.index') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700">Alumnos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('maestros.index') }}" class="block py-2 pl-3 pr-4 text-gray-700 hover:text-blue-700">Maestros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <br>
    <div class="flex items-center justify-center">
        {% block container %}
        {% endblock %}
    </div>

    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>
</html>
